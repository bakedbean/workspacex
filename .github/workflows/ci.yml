name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref,
# so rapid pushes don't pile up redundant CI runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Fail the build on any warning from rustc (clippy handles its own -D below).
  RUSTFLAGS: -D warnings

jobs:
  # Formatting and lints are platform-independent (both supported targets are
  # Unix), so run them once on Linux rather than across the OS matrix.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The toolchain version + rustfmt/clippy components are pinned in
      # rust-toolchain.toml, which rustup reads automatically.
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets --all-features
      # `cargo test --all-targets` does not run doctests, so cover them too.
      - run: cargo test --doc --all-features
